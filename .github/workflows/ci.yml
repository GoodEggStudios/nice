name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: |
          mkdir -p test-results
          npm run test:unit -- --reporter=default --reporter=junit --outputFile.junit=test-results/unit.xml

      - name: E2E tests
        run: |
          mkdir -p test-results
          npm run test:e2e -- --reporter=default --reporter=junit --outputFile.junit=test-results/e2e.xml

      - name: Publish test report
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && !cancelled()
        with:
          files: test-results/**/*.xml
          check_name: Test Results
          comment_mode: always
          report_individual_runs: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
