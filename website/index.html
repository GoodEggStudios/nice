    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            text-align: center;
        }

        .header-nav {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .get-started {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fbbf24;
            color: #000;
            font-family: 'Bungee', cursive;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .get-started:hover {
            transform: scale(1.05);
            background: #f59e0b;
        }

        .get-started:active {
            transform: scale(0.95);
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.15s ease, color 0.15s ease;
        }

        .github-link:hover {
            transform: scale(1.05);
            color: #fbbf24;
        }

        .github-link:active {
            transform: scale(0.95);
        }

        .github-link svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: 72px;
            color: #fbbf24;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 18px;
            color: #9ca3af;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-top: -16px;
            margin-bottom: 24px;
        }

        .cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 18px;
            color: #9ca3af;
            flex-wrap: wrap;
        }

        .cta-text {
            line-height: 1.6;
        }

        .nice-inline {
            display: inline-flex;
            vertical-align: middle;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 48px;
            }
            .subtitle {
                font-size: 12px;
            }
            .cta {
                font-size: 16px;
                gap: 6px;
            }
            .header-nav {
                top: 16px;
                right: 16px;
                gap: 8px;
            }
            .get-started {
                font-size: 12px;
                padding: 8px 16px;
            }
            .github-link {
                width: 32px;
                height: 32px;
            }
            .github-link svg {
                width: 22px;
                height: 22px;
            }
        }

        .footer {
            position: fixed;
            bottom: 16px;
            font-size: 12px;
            color: #555;
        }

        .footer a {
            color: #888;
            text-decoration: none;
        }

        .footer a:hover {
            color: #fbbf24;
        }
    </style>
