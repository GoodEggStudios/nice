<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nice Button</title>
    <meta name="description" content="Click nice on this button!">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nice.sbs/">
    <meta property="og:title" content="Nice Button">
    <meta property="og:description" content="Click nice on this button!">
    <meta property="og:image" content="https://nice.sbs/og-image.png">
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=block" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            text-align: center;
        }

        .logo {
            position: fixed;
            top: 24px;
            left: 24px;
            font-family: 'Bungee', cursive;
            font-size: 24px;
            color: #fbbf24;
            text-decoration: none;
        }

        .logo:hover {
            color: #f59e0b;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .button-frame {
            transform: scale(2);
            transform-origin: center;
        }

        .count {
            font-family: 'Bungee', cursive;
            font-size: 48px;
            color: #fbbf24;
            margin-top: 24px;
        }

        .count-label {
            font-size: 14px;
            color: #666;
            margin-top: -8px;
        }

        .loading {
            color: #666;
            font-size: 16px;
        }

        .error {
            color: #ef4444;
            font-size: 16px;
        }

        .footer {
            position: fixed;
            bottom: 16px;
            font-size: 12px;
            color: #555;
        }

        .footer a {
            color: #888;
            text-decoration: none;
        }

        .footer a:hover {
            color: #fbbf24;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            opacity: 0;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            15% {
                opacity: 1;
                transform: translateY(calc(var(--lift, -120px))) translateX(calc(var(--drift, 0px) * 0.3)) rotate(180deg) scale(1);
            }
            60% {
                opacity: 0.9;
            }
            100% {
                opacity: 0;
                transform: translateY(60vh) translateX(var(--drift, 0px)) rotate(720deg) scale(0.2);
            }
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 20px;
                top: 16px;
                left: 16px;
            }
            .button-frame {
                transform: scale(1.5);
            }
            .count {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="logo">NICE</a>

    <div class="button-container">
        <div id="content">
            <p class="loading">Loading...</p>
        </div>
    </div>

    <div class="footer">
        <a href="/create">Create your own</a>
    </div>

    <script>
        const API_BASE = 'https://api.nice.sbs';
        
        // Get button ID from query param: /button?id=xxx
        const buttonId = new URLSearchParams(window.location.search).get('id');
        
        const content = document.getElementById('content');

        if (!buttonId) {
            content.innerHTML = '<p class="error">No button ID provided</p>';
        } else {
            loadButton(buttonId);
        }

        async function loadButton(id) {
            try {
                // Fetch count to verify button exists
                const res = await fetch(`${API_BASE}/api/v1/nice/${id}/count`);
                
                if (!res.ok) {
                    throw new Error('Button not found');
                }

                const data = await res.json();
                const count = data.count || 0;

                content.innerHTML = `
                    <div class="button-frame">
                        <iframe 
                            src="${API_BASE}/e/${id}?theme=dark&size=lg"
                            style="border:none; width:120px; height:44px;"
                            scrolling="no"
                            frameborder="0"
                            title="Nice this">
                        </iframe>
                    </div>
                    <div class="count">${formatCount(count)}</div>
                    <p class="count-label">nice${count === 1 ? '' : 's'}</p>
                `;

                // Update page title
                document.title = `Nice (${formatCount(count)})`;

            } catch (err) {
                content.innerHTML = `<p class="error">Button not found</p>`;
            }
        }

        function formatCount(n) {
            if (n < 1000) return n.toString();
            if (n < 1000000) {
                const k = n / 1000;
                return k >= 10 ? Math.floor(k) + 'k' : k.toFixed(1).replace(/\.0$/, '') + 'k';
            }
            const m = n / 1000000;
            return m >= 10 ? Math.floor(m) + 'M' : m.toFixed(1).replace(/\.0$/, '') + 'M';
        }

        // Listen for nice events from the embed iframe
        window.addEventListener('message', function(event) {
            // Only accept messages from the API origin
            if (!event.origin.includes('nice.sbs')) return;
            
            const data = event.data;
            if (data.type === 'nice-recorded' && data.buttonId === buttonId) {
                // Update count display
                const countEl = document.querySelector('.count');
                const labelEl = document.querySelector('.count-label');
                if (countEl) {
                    countEl.textContent = formatCount(data.count);
                    document.title = `Nice (${formatCount(data.count)})`;
                }
                if (labelEl) {
                    labelEl.textContent = data.count === 1 ? 'nice' : 'nices';
                }
                
                // Shoot confetti!
                launchConfetti();
            }
        });

        function launchConfetti() {
            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const buttonFrame = document.querySelector('.button-frame');
            const rect = buttonFrame ? buttonFrame.getBoundingClientRect() : { left: window.innerWidth / 2 - 60, right: window.innerWidth / 2 + 60, top: window.innerHeight / 2 };
            
            const colors = ['#fbbf24', '#f59e0b', '#fcd34d', '#fde68a', '#fffbeb', '#fff'];
            const shapes = ['square', 'circle', 'rectangle'];
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                
                // Start from across the top of the button area
                const startX = rect.left + Math.random() * (rect.right - rect.left);
                const startY = rect.top - 10;
                
                // Spread out horizontally as they fall
                const drift = (Math.random() - 0.5) * 200;
                
                piece.style.left = startX + 'px';
                piece.style.top = startY + 'px';
                piece.style.backgroundColor = color;
                piece.style.width = (4 + Math.random() * 8) + 'px';
                piece.style.height = shape === 'rectangle' ? (8 + Math.random() * 6) + 'px' : piece.style.width;
                piece.style.borderRadius = shape === 'circle' ? '50%' : '1px';
                piece.style.animation = `confetti-fall ${1.8 + Math.random() * 1.2}s cubic-bezier(0.15, 0.8, 0.35, 1) forwards`;
                piece.style.setProperty('--drift', drift + 'px');
                piece.style.setProperty('--lift', -(80 + Math.random() * 120) + 'px');
                
                container.appendChild(piece);
            }

            // Clean up after animation
            setTimeout(() => container.remove(), 3000);
        }
    </script>
</body>
</html>
