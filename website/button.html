<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nice Button</title>
    <meta name="description" content="Click nice on this button!">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nice.sbs/">
    <meta property="og:title" content="Nice Button">
    <meta property="og:description" content="Click nice on this button!">
    <meta property="og:image" content="https://nice.sbs/og-image.png">
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=block" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            text-align: center;
        }

        .logo {
            position: fixed;
            top: 24px;
            left: 24px;
            font-family: 'Bungee', cursive;
            font-size: 24px;
            color: #fbbf24;
            text-decoration: none;
        }

        .logo:hover {
            color: #f59e0b;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            -webkit-user-select: none;
            user-select: none;
        }

        .button-frame {
            transform: scale(2);
            transform-origin: center;
        }

        .count {
            font-family: 'Bungee', cursive;
            font-size: 48px;
            color: #fbbf24;
            margin-top: 24px;
        }

        .count-label {
            font-size: 14px;
            color: #666;
            margin-top: -8px;
        }

        .button-url {
            display: block;
            font-size: 13px;
            color: #888;
            text-decoration: none;
            margin-bottom: 32px;
            word-break: break-all;
            max-width: 400px;
        }

        .button-url:hover {
            color: #fbbf24;
        }

        .loading {
            color: #666;
            font-size: 16px;
        }

        .error {
            color: #ef4444;
            font-size: 16px;
        }

        .footer {
            position: fixed;
            bottom: 16px;
            font-size: 12px;
            color: #555;
        }

        .footer a {
            color: #888;
            text-decoration: none;
        }

        .footer a:hover {
            color: #fbbf24;
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 20px;
                top: 16px;
                left: 16px;
            }
            .button-frame {
                transform: scale(1.5);
            }
            .count {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="logo">NICE</a>

    <div class="button-container">
        <div id="content">
            <p class="loading">Loading...</p>
        </div>
    </div>

    <div class="footer">
        <a href="/create">Create your own</a>
    </div>

    <script>
        const API_BASE = 'https://api.nice.sbs';
        
        // Get button ID from query param: /button?id=xxx
        const buttonId = new URLSearchParams(window.location.search).get('id');
        
        const content = document.getElementById('content');

        if (!buttonId) {
            content.innerHTML = '<p class="error">No button ID provided</p>';
        } else {
            loadButton(buttonId);
        }

        async function loadButton(id) {
            try {
                // Fetch count to verify button exists
                const res = await fetch(`${API_BASE}/api/v1/nice/${id}/count`);
                
                if (!res.ok) {
                    throw new Error('Button not found');
                }

                const data = await res.json();
                const count = data.count || 0;
                const multiParam = data.multi_nice ? '&multi=1' : '';

                const urlHtml = data.url ? `<a href="${data.url}" class="button-url" target="_blank" rel="noopener">${data.url}</a>` : '';

                content.innerHTML = `
                    ${urlHtml}
                    <div class="button-frame">
                        <iframe 
                            src="${API_BASE}/e/${id}?theme=dark&size=lg${multiParam}"
                            style="border:none; width:120px; height:44px;"
                            scrolling="no"
                            frameborder="0"
                            title="Nice this">
                        </iframe>
                    </div>
                    <div class="count">${formatCount(count)}</div>
                    <p class="count-label">nice${count === 1 ? '' : 's'}</p>
                `;

                // Update page title
                document.title = `Nice (${formatCount(count)})`;

            } catch (err) {
                content.innerHTML = `<p class="error">Button not found</p>`;
            }
        }

        function formatCount(n) {
            if (n < 1000) return n.toString();
            if (n < 1000000) {
                const k = n / 1000;
                return k >= 10 ? Math.floor(k) + 'k' : k.toFixed(1).replace(/\.0$/, '') + 'k';
            }
            const m = n / 1000000;
            return m >= 10 ? Math.floor(m) + 'M' : m.toFixed(1).replace(/\.0$/, '') + 'M';
        }

        // Listen for nice events from the embed iframe
        window.addEventListener('message', function(event) {
            if (!event.origin.includes('nice.sbs')) return;
            const data = event.data;

            // Multi-nice: fires on every click — update count locally + confetti
            if (data.type === 'nice-clicked' && data.buttonId === buttonId) {
                window._isMultiNice = true;
                launchConfetti();
                // Update count instantly from embed's local count
                const countEl = document.querySelector('.count');
                const labelEl = document.querySelector('.count-label');
                if (countEl && data.count) {
                    countEl.textContent = formatCount(data.count);
                    document.title = `Nice (${formatCount(data.count)})`;
                }
                if (labelEl && data.count) {
                    labelEl.textContent = data.count === 1 ? 'nice' : 'nices';
                }
            }

            // Server confirmed — update count + confetti for single-nice
            if (data.type === 'nice-recorded' && data.buttonId === buttonId) {
                const countEl = document.querySelector('.count');
                const labelEl = document.querySelector('.count-label');
                if (countEl) {
                    countEl.textContent = formatCount(data.count);
                    document.title = `Nice (${formatCount(data.count)})`;
                }
                if (labelEl) {
                    labelEl.textContent = data.count === 1 ? 'nice' : 'nices';
                }
                // Single-nice: confetti on first successful nice
                // (multi-nice confetti is handled by nice-clicked)
                if (!window._isMultiNice && !window._hasConfettied) {
                    launchConfetti();
                    window._hasConfettied = true;
                }
            }
        });

        // Simple physics-based confetti — no libraries
        function launchConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');

            const buttonFrame = document.querySelector('.button-frame');
            const rect = buttonFrame
                ? buttonFrame.getBoundingClientRect()
                : { left: canvas.width / 2 - 60, width: 120, top: canvas.height / 2 };
            const originX = rect.left + rect.width / 2;
            const originY = rect.top;

            const colors = ['#fbbf24', '#f59e0b', '#fcd34d', '#fde68a', '#fff'];
            const GRAVITY = 0.12;       // pixels/frame² — gentle pull
            const DRAG = 0.98;          // air resistance
            const PARTICLE_COUNT = 35;

            const particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2; // spread ~70° upward
                const speed = 6 + Math.random() * 8;
                particles.push({
                    x: originX + (Math.random() - 0.5) * rect.width * 0.6,
                    y: originY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    w: 4 + Math.random() * 5,
                    h: 3 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12,
                    opacity: 1,
                });
            }

            let frame = 0;
            function tick() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;

                for (const p of particles) {
                    // Physics
                    p.vy += GRAVITY;            // gravity accelerates downward
                    p.vx *= DRAG;               // air resistance
                    p.vy *= DRAG;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rotation += p.rotSpeed;

                    // Fade out after they start falling (vy > 0 means falling)
                    if (p.vy > 0 && frame > 20) {
                        p.opacity -= 0.008;
                    }

                    if (p.opacity <= 0 || p.y > canvas.height) continue;
                    alive = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }

                frame++;
                if (alive && frame < 300) {
                    requestAnimationFrame(tick);
                } else {
                    canvas.remove();
                }
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
